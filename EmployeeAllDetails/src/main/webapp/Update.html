<!DOCTYPE html>
<html>
<head>
    <title>Update Employee</title>
</head>
<body>
    <h2>Update Employee Details</h2>
    <form action="update" method="post">

        <label>Employee ID (to update):</label><br>
        <input type="text" name="id" required><br><br>

        <label>New Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>New Designation:</label><br>
        <input type="text" name="des" required><br><br>

        <label>New Salary:</label><br>
        <input type="number" step="0.01" name="salary" required><br><br>

        <label>New Experience (years):</label><br>
        <input type="text" name="exp" required><br><br>

        <button type="submit">Update Employee</button>
    </form>
</body>
</html>
